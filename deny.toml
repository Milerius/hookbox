[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]

[advisories]
yanked = "deny"

[licenses]
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
skip = [
    { crate = "syn@1", reason = "bolero-generator-derive depends on syn v1" },
    { crate = "getrandom@0.2", reason = "transitive via bolero → rand 0.8 and ring" },
    { crate = "getrandom@0.3", reason = "transitive via metrics-util → rand 0.9" },
    { crate = "rand@0.8", reason = "bolero and sqlx depend on rand 0.8" },
    { crate = "rand_core@0.6", reason = "transitive via rand 0.8" },
    { crate = "rand_chacha@0.3", reason = "transitive via rand 0.8" },
    { crate = "rand_xoshiro@0.6", reason = "bolero-engine depends on rand_xoshiro 0.6" },
    { crate = "hashbrown@0.15", reason = "sqlx-core and metrics-util depend on hashbrown 0.15" },
    { crate = "thiserror@1", reason = "metrics-exporter-prometheus depends on thiserror 1.x" },
    { crate = "thiserror-impl@1", reason = "transitive via thiserror 1.x" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
