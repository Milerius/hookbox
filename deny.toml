[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]

[advisories]
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071: Marvin Attack timing side-channel in rsa crate.
    # No patched version available. Used only for signature *verification* (public-key
    # operation) in TripleAFiatVerifier; the private key never touches this process,
    # so key-recovery is not a practical risk in our deployment model.
    { id = "RUSTSEC-2023-0071", reason = "verification-only use; private key absent from process; no fix available upstream" },
    # RUSTSEC-2026-0097: rand 0.8 unsound with custom logger + thread_rng reseeding.
    # Only affects rand 0.8 (dev-dependency for RSA test key generation in hookbox-providers).
    # Not used in production code. Conditions (custom logger + thread_rng + reseed) don't
    # apply in our test harness. Fix: upgrade to rand 0.9.3+ when rsa crate supports it.
    { id = "RUSTSEC-2026-0097", reason = "dev-dependency only (RSA test keygen); conditions not met in test harness" },
    # RUSTSEC-2025-0134: rustls-pemfile is unmaintained (archived Aug 2025).
    # Transitive dependency via async-nats. Using rustls-pki-types internally; no action needed.
    { id = "RUSTSEC-2025-0134", reason = "transitive via async-nats; crate is a thin wrapper around rustls-pki-types" },
    # RUSTSEC-2026-0049: webpki CRL Distribution Point matching logic flaw.
    # Transitive dependency via AWS SDK. We do not use CRL validation.
    { id = "RUSTSEC-2026-0049", reason = "transitive via AWS SDK; CRL validation not used in hookbox" },
]

[licenses]
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
skip = [
    # crypto crate duplicates: sqlx still uses digest/sha2/hmac 0.10.x, we use 0.11.x/0.13.x
    { crate = "block-buffer@0.10", reason = "sqlx depends on digest 0.10 → block-buffer 0.10" },
    { crate = "cpufeatures@0.2", reason = "sqlx depends on sha2 0.10 → cpufeatures 0.2" },
    { crate = "crypto-common@0.1", reason = "sqlx depends on digest 0.10 → crypto-common 0.1" },
    { crate = "digest@0.10", reason = "sqlx depends on digest 0.10" },
    { crate = "hmac@0.12", reason = "sqlx-postgres depends on hmac 0.12" },
    { crate = "sha2@0.10", reason = "sqlx-core depends on sha2 0.10" },
    # rand duplicates: sqlx uses rand 0.8, metrics uses rand 0.9
    { crate = "getrandom@0.2", reason = "transitive via sqlx → rand 0.8 and ring" },
    { crate = "getrandom@0.3", reason = "transitive via metrics-util → rand 0.9" },
    { crate = "rand@0.8", reason = "sqlx depends on rand 0.8" },
    { crate = "rand_core@0.6", reason = "transitive via rand 0.8" },
    { crate = "rand_chacha@0.3", reason = "transitive via rand 0.8" },
    # hashbrown/foldhash duplicates: metrics-util uses 0.16, indexmap uses 0.17
    { crate = "hashbrown@0.16", reason = "metrics-util depends on hashbrown 0.16" },
    { crate = "hashbrown@0.15", reason = "sqlx depends on hashbrown 0.15 via hashlink" },
    { crate = "foldhash@0.1", reason = "transitive via hashbrown 0.15 in sqlx" },
    # bolero pulls old toml_edit/winnow via proc-macro-crate
    { crate = "toml_edit@0.20", reason = "bolero → proc-macro-crate uses toml_edit 0.20" },
    { crate = "winnow@0.5", reason = "transitive via toml_edit 0.20" },
    # rsa 0.9 pulls der/spki/pkcs8 which depend on const-oid 0.9; workspace uses 0.10 via digest 0.11
    { crate = "const-oid@0.9", reason = "rsa crate depends on older der stack with const-oid 0.9" },
    # reqwest native-tls path pulls core-foundation 0.10; hyper-util pulls 0.9
    { crate = "core-foundation@0.9", reason = "hyper-util depends on core-foundation 0.9; native-tls uses 0.10" },
    # AWS SDK duplicates: aws-smithy-http-client uses hyper 0.14 alongside hyper 1.x
    { crate = "h2@0.3", reason = "AWS SDK uses hyper 0.14 which depends on h2 0.3" },
    { crate = "http@0.2", reason = "AWS SDK uses http 0.2 alongside http 1.x" },
    { crate = "http-body@0.4", reason = "AWS SDK uses http-body 0.4 alongside 1.x" },
    { crate = "hyper@0.14", reason = "AWS SDK uses hyper 0.14 alongside hyper 1.x" },
    { crate = "hyper-rustls@0.24", reason = "AWS SDK uses hyper-rustls 0.24 alongside 0.27" },
    { crate = "rustls@0.21", reason = "AWS SDK transitively depends on rustls 0.21" },
    { crate = "rustls-native-certs@0.7", reason = "AWS SDK transitively depends on older rustls-native-certs" },
    { crate = "rustls-webpki@0.101", reason = "AWS SDK transitively depends on older rustls-webpki" },
    { crate = "rustls-webpki@0.102", reason = "AWS SDK transitively depends on rustls-webpki 0.102" },
    # thiserror duplicates: thiserror 1.x vs 2.x from different transitive deps
    { crate = "thiserror@1", reason = "AWS SDK transitively depends on thiserror 1.x; workspace uses 2.x" },
    { crate = "thiserror-impl@1", reason = "transitive via thiserror 1.x" },
    { crate = "security-framework@2.11", reason = "AWS SDK transitively depends on older security-framework" },
    { crate = "socket2@0.5", reason = "AWS SDK transitively depends on socket2 0.5" },
    { crate = "tokio-rustls@0.24", reason = "AWS SDK transitively depends on tokio-rustls 0.24" },
    { crate = "openssl-probe@0.1", reason = "AWS SDK transitively depends on older openssl-probe" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
