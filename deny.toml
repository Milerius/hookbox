[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]

[advisories]
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071: Marvin Attack timing side-channel in rsa crate.
    # No patched version available. Used only for signature *verification* (public-key
    # operation) in TripleAFiatVerifier; the private key never touches this process,
    # so key-recovery is not a practical risk in our deployment model.
    { id = "RUSTSEC-2023-0071", reason = "verification-only use; private key absent from process; no fix available upstream" },
]

[licenses]
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
skip = [
    # crypto crate duplicates: sqlx still uses digest/sha2/hmac 0.10.x, we use 0.11.x/0.13.x
    { crate = "block-buffer@0.10", reason = "sqlx depends on digest 0.10 → block-buffer 0.10" },
    { crate = "cpufeatures@0.2", reason = "sqlx depends on sha2 0.10 → cpufeatures 0.2" },
    { crate = "crypto-common@0.1", reason = "sqlx depends on digest 0.10 → crypto-common 0.1" },
    { crate = "digest@0.10", reason = "sqlx depends on digest 0.10" },
    { crate = "hmac@0.12", reason = "sqlx-postgres depends on hmac 0.12" },
    { crate = "sha2@0.10", reason = "sqlx-core depends on sha2 0.10" },
    # rand duplicates: sqlx uses rand 0.8, metrics uses rand 0.9
    { crate = "getrandom@0.2", reason = "transitive via sqlx → rand 0.8 and ring" },
    { crate = "getrandom@0.3", reason = "transitive via metrics-util → rand 0.9" },
    { crate = "rand@0.8", reason = "sqlx depends on rand 0.8" },
    { crate = "rand_core@0.6", reason = "transitive via rand 0.8" },
    { crate = "rand_chacha@0.3", reason = "transitive via rand 0.8" },
    # hashbrown/foldhash duplicates: metrics-util uses 0.16, indexmap uses 0.17
    { crate = "hashbrown@0.16", reason = "metrics-util depends on hashbrown 0.16" },
    { crate = "hashbrown@0.15", reason = "sqlx depends on hashbrown 0.15 via hashlink" },
    { crate = "foldhash@0.1", reason = "transitive via hashbrown 0.15 in sqlx" },
    # bolero pulls old toml_edit/winnow via proc-macro-crate
    { crate = "toml_edit@0.20", reason = "bolero → proc-macro-crate uses toml_edit 0.20" },
    { crate = "winnow@0.5", reason = "transitive via toml_edit 0.20" },
    # rsa 0.9 pulls der/spki/pkcs8 which depend on const-oid 0.9; workspace uses 0.10 via digest 0.11
    { crate = "const-oid@0.9", reason = "rsa crate depends on older der stack with const-oid 0.9" },
    # reqwest native-tls path pulls core-foundation 0.10; hyper-util pulls 0.9
    { crate = "core-foundation@0.9", reason = "hyper-util depends on core-foundation 0.9; native-tls uses 0.10" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
