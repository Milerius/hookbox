name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Unit tests (nextest)
        run: cargo nextest run --all-features --profile ci --no-tests=warn --workspace --exclude hookbox-integration-tests
      - name: BDD scenario tests
        run: cargo test -p hookbox --test bdd

  test-integration:
    name: Integration Test (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: hookbox
          POSTGRES_PASSWORD: hookbox
          POSTGRES_DB: hookbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test -p hookbox-integration-tests --all-features
        env:
          DATABASE_URL: postgres://hookbox:hookbox@localhost:5432/hookbox_test

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features --workspace --exclude hookbox-cli
        env:
          RUSTDOCFLAGS: "-D warnings"

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  careful:
    name: Cargo Careful
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-careful --locked
      - run: cargo +nightly careful test --workspace --all-features --exclude hookbox-integration-tests

  bolero:
    name: Property Tests (Bolero)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Bolero property tests
        run: cargo test -p hookbox-verify --all-features -- --test-threads=1

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: hookbox
          POSTGRES_PASSWORD: hookbox
          POSTGRES_DB: hookbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Line coverage (codecov)
        run: cargo +nightly llvm-cov --all-features --codecov --output-path codecov.json
        env:
          DATABASE_URL: postgres://hookbox:hookbox@localhost:5432/hookbox_test
      - name: Branch coverage (per-crate, avoids llvm-cov SIGSEGV)
        run: |
          # Branch coverage crashes llvm-cov for crates using async-trait macros.
          # Root cause: https://github.com/llvm/llvm-project/issues/189169
          # Fix merged in LLVM: https://github.com/llvm/llvm-project/pull/189270
          # TODO: switch back to workspace-wide --branch once Rust nightly ships
          # an LLVM version containing the fix.
          # Line coverage (above) covers the full workspace for codecov.
          cargo +nightly llvm-cov --branch -p hookbox-server --tests --lcov --output-path lcov-server.info || true
          cargo +nightly llvm-cov --branch -p hookbox-verify --lib --lcov --output-path lcov-verify.info || true
          # Merge available lcov files
          cat lcov-server.info lcov-verify.info > lcov.info 2>/dev/null || true
        env:
          DATABASE_URL: postgres://hookbox:hookbox@localhost:5432/hookbox_test
      - uses: codecov/codecov-action@v6
        with:
          files: codecov.json
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            codecov.json
            lcov.info
