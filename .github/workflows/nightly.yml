name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  mutants:
    name: Mutation Testing
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-mutants --locked
      - run: cargo mutants --timeout 60
      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutants-report
          path: mutants.out/

  coverage-full:
    name: Full Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Branch coverage (HTML)
        run: cargo +nightly llvm-cov --all-features --branch --html
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: target/llvm-cov/html/

  kani:
    name: Kani Proofs
    runs-on: ubuntu-latest
    if: hashFiles('crates/hookbox-verify/src/**') != ''
    steps:
      - uses: actions/checkout@v4
      - name: Run Kani
        uses: model-checking/kani-github-action@v1
        with:
          args: -p hookbox-verify
      - name: Extract proof results
        if: always()
        run: |
          echo "## Kani Proof Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E '(VERIFICATION|RESULT)' kani-output.txt 2>/dev/null || echo "No results found"
          echo '```' >> $GITHUB_STEP_SUMMARY

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      - name: Run fuzz targets
        run: |
          for target in $(cargo +nightly fuzz list 2>/dev/null || true); do
            echo "Fuzzing: $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=600 || true
          done
      - name: Upload fuzz artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: fuzz-artifacts
          path: |
            **/fuzz/corpus/
            **/fuzz/artifacts/

  bolero:
    name: Property Tests (Bolero)
    runs-on: ubuntu-latest
    if: hashFiles('crates/hookbox-verify/src/**') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p hookbox-verify --all-features -- --test-threads=1
